# Jekyll Configuration for GitHub Pages
title: PaymentHood
description: Enterprise payment orchestration platform with a unified API for 15+ payment providers. Accept payments in minutes without touching your code.
url: "https://www.paymenthood.com"
baseurl: ""
lang: en
author: PaymentHood

# Social Media & SEO (consumed by jekyll-seo-tag)
logo: /assets/images/logo2x.png
twitter:
  username: paymenthood
  card: summary_large_image
social:
  name: PaymentHood
  links:
    - https://github.com/paymenthood
    - https://docs.paymenthood.com

# Default page settings
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-image.png
      author: PaymentHood
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Sass configuration (sources in _sass/, entry files in assets/css/*.scss)
sass:
  style: compressed
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions

# GitHub Pages configuration
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from

# Exclude files from processing
exclude:
  - README.md
  - CLAUDE.md
  - legals/        # raw .md sources; rendered into privacy-policy/term-of-use via include_relative
  - .gitignore
  - .git/
  - .vs/

# GitHub Pages specific
safe: true
incremental: false
