# Structured data for the /integrations/phoca-cart/ pages.
# `software` drives the SoftwareApplication JSON-LD (via _includes/software-application.html);
# `faqs` drives the accordion + FAQPage JSON-LD (via _includes/faq.html). Answers may
# contain inline HTML (a/em/strong/br/ul/ol/li are allowed in FAQ rich results).
software:
  name: PaymentHood Phoca Cart Plugin
  operating_system: Joomla 4.0+
  download_url: https://github.com/paymenthood/PaymentHood.Plugins.PhocaCart/releases/latest/download/paymenthood-phocacart.zip

faqs:
  - q: Which Joomla and Phoca Cart versions does the plugin support?
    a: >-
      PaymentHood for Phoca Cart requires Joomla 4.0 or higher and a recent stable release of
      Phoca Cart. It is tested against Joomla 4 and Joomla 5 with the corresponding PHP 8.x
      requirements.
  - q: Does PaymentHood support recurring or subscription payments?
    a: >-
      Not at this time. The current version supports one-time checkout payments only.
      Recurring billing and subscription support is planned for a future release.
  - q: How do I get a PaymentHood API key?
    a: >-
      Create a free PaymentHood account, connect your chosen payment provider in the dashboard,
      and generate an API key. Paste that key into the PaymentHood plugin settings inside your
      Joomla admin.
  - q: Can I test payments before going live?
    a: >-
      Yes. The plugin includes a sandbox mode toggle. When enabled, all transactions route
      through your payment provider's test environment so you can verify the full checkout
      flow without processing real payments.
  - q: Will the plugin affect Phoca Cart's order and invoice system?
    a: >-
      No. The plugin acts purely as a payment bridge. All standard Phoca Cart functionality —
      order status updates, PDF invoices, email notifications, and stock management —
      continues to work exactly as configured.
  - q: Is there a cost to use the plugin?
    a: >-
      No. The PaymentHood Phoca Cart plugin is free to download and use. You pay only the
      transaction fees charged by your chosen payment provider — there are no additional fees
      from PaymentHood.
  - q: Can I switch payment providers without reinstalling the plugin?
    a: >-
      Yes. Provider switching happens entirely in your PaymentHood dashboard. Just activate a
      different provider there — the Joomla plugin and Phoca Cart configuration remain
      unchanged.

# `product` drives the whole product page via _includes/integration-product.html.
product:
  platform: Phoca Cart
  store: Joomla store
  audience: customers
  noun: plugin
  compat_name: Joomla                      # chip shows "Joomla 4.0+", not "Phoca Cart 4.0+"
  compat: "4.0+"
  version: "1.0.0"
  badge: Phoca Cart Integration
  supports_subscriptions: false
  install_url: /integrations/phoca-cart/installation/
  download_url: https://github.com/paymenthood/PaymentHood.Plugins.PhocaCart/releases/download/v1.0.0/paymenthood-phocacart.zip
  repo: PaymentHood.Plugins.PhocaCart
  logo: { src: /assets/images/phocacart/phocacart-logo.png }
  hero_title_html: 'The Payment Gateway<br>Built for <span class="txt-blue-50">Joomla Stores</span>'
  checkout_image: /assets/images/phocacart/phocacart-checkout.png
  steps:
    - { title: Download the Plugin, text: "Grab the latest release from GitHub. It's a standard Joomla extension package (.zip) — no build tools or extra steps required." }
    - { title: Install via Extension Manager, text: "In your Joomla admin go to <em>Extensions → Install</em>, upload the zip and install. Then enable the PaymentHood plugin in Phoca Cart's payment settings." }
