# Structured data for the /integrations/virtuemart/ pages.
# `software` drives the SoftwareApplication JSON-LD (via _includes/software-application.html);
# `faqs` drives the accordion + FAQPage JSON-LD (via _includes/faq.html). Answers may
# contain inline HTML (a/em/strong/br/ul/ol/li are allowed in FAQ rich results).
software:
  name: PaymentHood VirtueMart Plugin
  operating_system: Joomla 4.0+
  download_url: https://github.com/paymenthood/PaymentHood.Plugins.VirtueMart/releases/latest/download/paymenthood-virtuemart.zip

# `product` drives the whole product page via _includes/integration-product.html.
product:
  platform: VirtueMart
  compat: "4.0+"
  download_url: https://github.com/paymenthood/PaymentHood.Plugins.VirtueMart/releases/latest/download/paymenthood-virtuemart.zip
  repo: PaymentHood.Plugins.VirtueMart
  logo: { src: /assets/images/virtuemart/virtuemart-logo.png, width: 300, height: 120 }
  checkout_image: /assets/images/virtuemart/checkout.png
  ecosystem: Joomla                        # named in the default install steps
  install_path: 'Extensions → Manage → Install'

faqs:
  - q: Which Joomla and VirtueMart versions does the plugin support?
    a: >-
      PaymentHood for VirtueMart runs on Joomla 4.0 or higher with a supported VirtueMart 4
      release. It is tested against the latest stable Joomla and VirtueMart versions.
  - q: Does PaymentHood support subscriptions or recurring billing?
    a: >-
      Not at this time. The current version supports one-time checkout payments only.
      Subscription / recurring billing support is planned for a future release.
  - q: How do I get a PaymentHood API key?
    a: >-
      Create a free PaymentHood account, add your chosen payment provider in the dashboard,
      and generate an API key. Then paste that key into the VirtueMart payment method
      settings page.
  - q: Can I test payments before going live?
    a: >-
      Yes. The plugin includes a sandbox mode toggle. When enabled, all transactions are routed
      through your payment provider's sandbox environment so you can verify the full checkout
      flow without processing real payments.
  - q: How is the plugin installed on Joomla?
    a: >-
      It installs like any Joomla extension. Download the package, go to
      <em>Extensions → Manage → Install</em>, upload the file, then enable the PaymentHood
      payment plugin. It then appears as a payment method inside VirtueMart.
  - q: Is there a cost to use the plugin?
    a: >-
      No. The PaymentHood VirtueMart plugin is free to download and use. You pay only the
      transaction fees charged by your chosen payment provider — there are no additional fees
      from PaymentHood.
  - q: Can I switch payment providers without reinstalling the plugin?
    a: >-
      Yes. Provider switching happens in your PaymentHood dashboard — just activate a different
      provider there. Your VirtueMart plugin continues working without any changes on the
      Joomla side.

