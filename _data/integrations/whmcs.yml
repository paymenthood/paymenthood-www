# Structured data for the /integrations/whmcs/ pages.
# `software` drives the SoftwareApplication JSON-LD (via _includes/software-application.html);
# `faqs` drives the accordion + FAQPage JSON-LD (via _includes/faq.html). Answers may
# contain inline HTML (a/em/strong/br/ul/ol/li are allowed in FAQ rich results).
software:
  name: PaymentHood WHMCS Module
  operating_system: WHMCS 7.0+
  version: "1.2.0"
  download_url: https://github.com/paymenthood/PaymentHood.Plugins.WHMCS/releases/download/v1.2.0/paymenthood-whmcs.zip
  release_notes: https://github.com/paymenthood/PaymentHood.Plugins.WHMCS/releases/tag/v1.2.0

faqs:
  - q: Does PaymentHood support WHMCS subscriptions / automatic payments?
    a: >-
      Yes. When a client uses a payment method that supports agreements (such as PayPal, Stripe
      or Authorize.net), PaymentHood creates a subscription agreement directly at the provider.
      Subsequent renewal invoices generated by WHMCS are charged automatically — no client
      action required.
  - q: Which WHMCS versions are supported?
    a: >-
      PaymentHood is compatible with WHMCS 7.0 and above, including the latest WHMCS 8.x
      releases. It uses the official WHMCS gateway callback API so compatibility is maintained
      across upgrades.
  - q: Do I need a PaymentHood account?
    a: >-
      Yes — a free PaymentHood account is required to use the module. When you activate the
      gateway in WHMCS, you are redirected to PaymentHood to sign up with your Google account.
      The process takes under 30 seconds, and your sandbox and live apps are created
      automatically.
  - q: Can I switch payment providers without reinstalling the module?
    a: >-
      Absolutely. The module stays the same regardless of which provider you use. You change
      the active provider in the PaymentHood dashboard — WHMCS automatically routes payments
      through the new provider without any reconfiguration.
  - q: Is the module free? Are there any transaction fees?
    a: >-
      The WHMCS module itself is free and open-source (MIT license). PaymentHood charges a
      small platform fee per transaction — see the <a href="/pricing.html" class="txt-blue-100">Pricing page</a>
      for current rates. The payment provider may also charge their own processing fee.
  - q: What happens if a subscription payment fails?
    a: >-
      PaymentHood reports the failed payment back to WHMCS via the standard callback. WHMCS
      then follows its own retry and suspension rules — exactly as it would with any other
      gateway. You can configure those rules in WHMCS Automation Settings.
  - q: Where can I find the installation guide?
    a: >-
      The full step-by-step installation guide is available on the
      <a href="/integrations/whmcs/installation/" class="txt-blue-100">WHMCS Installation Guide</a> page.
      It includes screenshots for every step and covers download, upload, activation, sign-up,
      and going live.

