# FAQ content for /integrations/woocommerce/ — rendered by _includes/faq.html
# (drives both the visible accordion and the FAQPage JSON-LD). Answers may
# contain inline HTML (a/em/strong/br/ul/ol/li are allowed in FAQ rich results).
faqs:
  - q: Which WooCommerce versions does the plugin support?
    a: >-
      PaymentHood for WooCommerce requires WooCommerce 6.0 or higher on WordPress 5.8+.
      It is tested with the latest stable WooCommerce releases.
  - q: Does PaymentHood support WooCommerce Subscriptions?
    a: >-
      Not at this time. The current version supports one-time checkout payments only.
      Subscription / recurring billing support is planned for a future release.
  - q: How do I get a PaymentHood API key?
    a: >-
      Create a free PaymentHood account, add your chosen payment provider in the dashboard,
      and generate an API key. Then paste that key into the WooCommerce plugin settings page.
  - q: Can I test payments before going live?
    a: >-
      Yes. The plugin includes a sandbox mode toggle. When enabled, all transactions are routed
      through your payment provider's sandbox environment so you can verify the full checkout
      flow without processing real payments.
  - q: Does the plugin work with the WooCommerce Block Checkout?
    a: >-
      Yes. PaymentHood registers as a standard WooCommerce payment gateway and is compatible
      with both the Classic Checkout and the newer Block-based Checkout experience.
  - q: Is there a cost to use the plugin?
    a: >-
      No. The PaymentHood WooCommerce plugin is free to download and use. You pay only the
      transaction fees charged by your chosen payment provider — there are no additional fees
      from PaymentHood.
  - q: Can I switch payment providers without reinstalling the plugin?
    a: >-
      Yes. Provider switching happens in your PaymentHood dashboard — just activate a different
      provider there. Your WooCommerce plugin continues working without any changes on the
      WordPress side.
