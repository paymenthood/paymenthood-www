# Structured data for the /integrations/woocommerce/ pages.
# `software` drives the SoftwareApplication JSON-LD (via _includes/software-application.html);
# `faqs` drives the accordion + FAQPage JSON-LD (via _includes/faq.html). Answers may
# contain inline HTML (a/em/strong/br/ul/ol/li are allowed in FAQ rich results).
# `product` drives the whole product page via _includes/integration-product.html —
# one shared template renders every integration from this data. See any other
# integrations/<slug>.yml for the same shape.

product:
  platform: WooCommerce                    # display name woven through all shared copy
  store: WordPress store                   # "on your ___"
  audience: customers                      # customers | clients
  noun: plugin                             # plugin | module | extension
  compat: "6.0+"                           # hero version pill ("WooCommerce 6.0+")
  version: "1.0.0"
  badge: WooCommerce Integration
  supports_subscriptions: false            # true → subscription card + comparison + recurring copy
  install_url: /integrations/woocommerce/installation/
  download_url: https://github.com/paymenthood/PaymentHood.Plugins.WooCommerce/releases/download/v1.0.0/paymenthood-woocommerce.zip
  repo: PaymentHood.Plugins.WooCommerce     # open-source repo under github.com/paymenthood
  logo: { src: /assets/images/woocommerce/woo-logo.png, width: 225, height: 225 }
  hero_title_html: 'The Payment Gateway<br>Your <span class="txt-blue-50">WooCommerce Store</span><br>Deserves'
  checkout_image: /assets/images/woocommerce/woo-checkout.png
  steps:                                   # install flow — genuinely per platform
    - { title: Download the Plugin, text: "Grab the latest release from GitHub. It's a standard WordPress plugin zip — no build steps, no dependencies." }
    - { title: Upload & Activate in WordPress, text: 'Go to <em>Plugins → Add New → Upload Plugin</em>, select the zip, activate — and PaymentHood appears in your WooCommerce payment gateways list.' }
    - { title: Connect Your PaymentHood Account, text: 'Paste your PaymentHood API key in the plugin settings, choose sandbox or live mode, and save. Your store is now ready to accept payments.' }
software:
  name: PaymentHood WooCommerce Plugin
  operating_system: WordPress 5.8+ with WooCommerce 6.0+
  version: "1.0.0"
  download_url: https://github.com/paymenthood/PaymentHood.Plugins.WooCommerce/releases/download/v1.0.0/paymenthood-woocommerce.zip

faqs:
  - q: Which WooCommerce versions does the plugin support?
    a: >-
      PaymentHood for WooCommerce requires WooCommerce 6.0 or higher on WordPress 5.8+.
      It is tested with the latest stable WooCommerce releases.
  - q: Does PaymentHood support WooCommerce Subscriptions?
    a: >-
      Not at this time. The current version supports one-time checkout payments only.
      Subscription / recurring billing support is planned for a future release.
  - q: How do I get a PaymentHood API key?
    a: >-
      Create a free PaymentHood account, add your chosen payment provider in the dashboard,
      and generate an API key. Then paste that key into the WooCommerce plugin settings page.
  - q: Can I test payments before going live?
    a: >-
      Yes. The plugin includes a sandbox mode toggle. When enabled, all transactions are routed
      through your payment provider's sandbox environment so you can verify the full checkout
      flow without processing real payments.
  - q: Does the plugin work with the WooCommerce Block Checkout?
    a: >-
      Yes. PaymentHood registers as a standard WooCommerce payment gateway and is compatible
      with both the Classic Checkout and the newer Block-based Checkout experience.
  - q: Is there a cost to use the plugin?
    a: >-
      No. The PaymentHood WooCommerce plugin is free to download and use. You pay only the
      transaction fees charged by your chosen payment provider — there are no additional fees
      from PaymentHood.
  - q: Can I switch payment providers without reinstalling the plugin?
    a: >-
      Yes. Provider switching happens in your PaymentHood dashboard — just activate a different
      provider there. Your WooCommerce plugin continues working without any changes on the
      WordPress side.
