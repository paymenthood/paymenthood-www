<!DOCTYPE html>
<html lang="en" class="js">

<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
            new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-WZ5M4HR8');</script>
    <!-- End Google Tag Manager -->

    <!-- Preconnect hints (must be early in head for maximum benefit) -->
    <link rel="preconnect" href="https://console.paymenthood.com">
    <link rel="dns-prefetch" href="https://console.paymenthood.com">

    <meta charset="utf-8">
    <meta name="author" content="PaymentHood!">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover">
    {% if page.noindex %}
    <meta name="robots" content="noindex, nofollow">
    {% endif %}

    {% seo %}

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PaymentHood",
      "url": "{{ site.url }}",
      "logo": "{{ site.url }}/assets/images/logo.png",
      "description": "{{ site.description }}",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "email": "support@paymenthood.com",
        "url": "{{ site.url }}/contact-us.html"
      },
      "sameAs": [
        "https://github.com/paymenthood"
      ]
    }
    </script>

    <!-- Fav Icon  -->
    <link rel="icon" href="{{ '/favicon.png' | relative_url }}" type="image/png">
    <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
    
    <!-- Preload fonts -->
    <link rel="preload" href="{{ '/assets/fonts/Roboto-Light.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ '/assets/fonts/Roboto-Medium.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="{{ '/assets/fonts/Roboto-Bold.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

    <!-- Preload LCP images -->
    <link rel="preload" as="image" href="{{ '/assets/images/home/banner-bg-large.webp' | relative_url }}" type="image/webp" fetchpriority="high" media="(min-width: 992px)">
    <link rel="preload" as="image" href="{{ '/assets/images/home/banner-bg.webp' | relative_url }}" type="image/webp" fetchpriority="high" media="(max-width: 991px)">
    <link rel="preload" as="image" href="{{ '/assets/images/home/banner-mask-small.svg' | relative_url }}" type="image/svg+xml">
    <link rel="preload" as="image" href="{{ '/assets/images/shape-x.png' | relative_url }}" type="image/png">
    
    <!-- Critical CSS for LCP (hero mask) - inlined to ensure immediate render -->
    <style>
        :root{--blue-200:#1940b0;--blue-200-rgb:25,64,176;--bs-bg-opacity:1;}
        body{margin:0;}
        .bg-blue-200{background-color:rgba(var(--blue-200-rgb),var(--bs-bg-opacity));}
        .header-banner{position:relative;min-height:72px;}
        .banner{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:800px;padding-bottom:100px;}
        .nk-ovm,.nk-ovm:before,.nk-ovm:after{position:absolute;top:0;right:0;bottom:0;left:0;background-repeat:no-repeat;background-size:cover;background-position:50% 50%;}
        .nk-ovm:before,.nk-ovm:after{content:"";bottom:-1px;left:-1px;}
        .mask-contain-bottom:before{background-size:contain;background-position:50% 100%;}
        .shape-x:after{background-image:url("{{ '/assets/images/shape-x.png' | relative_url }}");}
        .shape-x.nk-ovm:after,.shape-x.nk-ovm:before{right:0!important;}
        #homeBannerMask{background:url("{{ '/assets/images/home/banner-bg-large.webp' | relative_url }}") no-repeat right top;}
        #homeBannerMask:before{background-image:url("{{ '/assets/images/home/banner-mask-small.svg' | relative_url }}");background-size:contain;background-position:101% 101%;right:-1px!important;left:-1px!important;}
        #homeBannerMask:after{background-image:url("{{ '/assets/images/shape-x.png' | relative_url }}"),linear-gradient(to left,rgba(var(--blue-200-rgb),0) 10%,rgba(var(--blue-200-rgb),.6),rgba(var(--blue-200-rgb),1) 70%);}
        @media (max-width: 991px){#homeBannerMask{background:url("{{ '/assets/images/home/banner-bg.webp' | relative_url }}") no-repeat right top;}#homeBannerMask:after{background-image:url("{{ '/assets/images/shape-x.png' | relative_url }}"),linear-gradient(219deg,rgb(var(--blue-200-rgb),31%),rgb(var(--blue-200-rgb),42%),rgba(var(--blue-200-rgb),.95) 70%);}}
        @media (max-width: 575px){#homeBannerMask{background-position-x:81%;background-size:283%;}}
        @media (min-width: 992px){.header-banner{min-height:98px;}}
    </style>

    <!-- Non-render-blocking CSS using media="print" pattern -->
    <link rel="stylesheet" href="{{ '/assets/css/vendor.bundle.css' | relative_url }}" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="{{ '/assets/css/vendor.bundle.css' | relative_url }}">
        <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    </noscript>

</head>

<body class="nk-body body-wider mode-onepage">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WZ5M4HR8"
                  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    <div class="nk-wrap">
        <header class="nk-header page-header is-transparent is-sticky is-shrink" id="header">

            <div class="header-main">
                <div class="header-container container">
                    <div class="header-wrap">

                        <div class="header-logo logo animated" data-animate="fadeInDown" data-delay=".6">

                                <img class="logo-dark" src="{{ '/assets/images/logo.png' | relative_url }}" srcset="{{ '/assets/images/logo2x.png' | relative_url }} 2x" alt="logo">
                                <img class="logo-light" src="{{ '/assets/images/logo-full-white.png' | relative_url }}" srcset="{{ '/assets/images/logo-full-white2x.png' | relative_url }} 2x" alt="logo">
                            </a>
                        </div>
                        <!-- Menu Toogle @s -->
                        <div class="header-nav-toggle">
                            <a href="#" class="navbar-toggle" data-menu-toggle="header-menu">
                                <div class="toggle-line">
                                    <span></span>
                                </div>
                            </a>
                        </div>
                        <!-- Menu @s -->
                        <div class="header-navbar animated" data-animate="fadeInDown" data-delay=".75">
                            <nav class="header-menu" id="header-menu">
                                <ul class="menu">
                                    <li class="menu-item"><a class="menu-link nav-link" href="{{ '/' | relative_url }}">Home</a></li>
                                    <li class="d-none menu-item"><a class="menu-link nav-link" href="/features.html">Features</a></li>
                                    <li class="menu-item has-sub">
                                        <a class="menu-link nav-link" href="#">Integrations</a>
                                        <ul class="menu-sub">
                                            <li class="menu-item">
                                                <a class="menu-link d-flex align-items-center gap-2" href="/whmcs/">
                                                    <img src="{{ '/assets/images/whmcs/whmcs-icon.png' | relative_url }}" alt="WHMCS"/>
                                                    <span>WHMCS</span>
                                                </a>
                                            </li>
                                            <li class="menu-item">
                                                <a class="menu-link d-flex align-items-center gap-2" href="/woocommerce/">
                                                    <img src="{{ '/assets/images/woocommerce/woo-icon.png' | relative_url }}" alt="WooCommerce"/>
                                                    <span>WooCommerce</span>
                                                </a>
                                            </li>
                                            <li class="menu-item">
                                                <a class="menu-link d-flex align-items-center gap-2" href="/phoca-cart/">
                                                    <img src="{{ '/assets/images/phocacart/phocacart-icon.png' | relative_url }}" alt="Phoca Cart"/>
                                                    <span>Phoca Cart</span>
                                                </a>
                                            </li>
                                        </ul>
                                    </li>
                                    <li class="menu-item"><a class="menu-link nav-link" href="/pricing.html">Pricing</a></li>
                                    <li class="menu-item"><a class="menu-link nav-link" href="/contact-us.html">Contact Us</a></li>
                                </ul>
                                <ul class="menu-btns">
                                    <li><a href="https://console.paymenthood.com/auth/signin?returnUrl=https:%2F%2Fconsole.paymenthood.com%2F&grantAuthorization=false" target="_blank" class="vh-btn btn-md btn-auto btn-green-300 vh-btn-outline no-change"><span>Sign in to the Console</span></a></li>
                                    <li><a href="https://console.paymenthood.com/auth/signin?returnUrl=https:%2F%2Fconsole.paymenthood.com%2F&grantAuthorization=false" target="_blank" class="vh-btn btn-md btn-auto btn-green-300 no-change"><span>Start 1 - Month Free</span></a></li>
                                </ul>
                            </nav>
                        </div><!-- .header-navbar @e -->
                    </div>
                </div>
            </div><!-- .header-main @e -->
        </header>
